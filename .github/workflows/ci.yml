name: CI

# PR 上跑权威门同款 Vitest，给 PR 一个真·绿勾。
# lfg 第 8 步 watch CI 时能看到真 check，不再对"零 check"空转。
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # 与容器一致：不下 Electron 预编译二进制；Vitest 不需要它。
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test

  # e2e 真门：在 ubuntu runner 上用 xvfb 真启动 Electron 跑 Playwright，
  # 抓「vitest 全绿但 app 其实打不开」这类渲染层 bug（spec2 就栽在这）。
  # 这道 job 现在跑全部 e2e（playwright testDir=./e2e），含三层：
  #   ① 各 spec 的功能/强断言 e2e（如 theme-visual：读真实 computed 亮度，不是查 class）
  #   ② va-runner：扫 specs/*.va.json，按人写的可见验收清单真验屏幕效果
  #   ③ va-selftest：把样式打掉后断言 VA 必红 —— 证明门不是哑的（门存在≠门够强）
  # 要让红 e2e 真挡住 merge，需在 GitHub 把本 job 设为 main 的 required status check。
  # 独立 job，绝不继承上面 test job 的 ELECTRON_SKIP_BINARY_DOWNLOAD=1
  # ——e2e 要真 Electron 二进制；CI runner 无防火墙能正常下载。
  e2e:
    # pin 22.04（jammy）：ubuntu-latest 已指向 24.04（noble），其包名漂移
    # （libasound2→libasound2t64 等）会让 playwright install-deps 补不全 Electron
    # 的 Chromium 系统库、正常 app 也启动失败 → 门误红。22.04 上这套组合成熟稳定。
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: sudo apt-get update && sudo apt-get install -y xvfb
      - run: npx playwright install-deps chromium
      - run: xvfb-run -a --server-args="-screen 0 1280x720x24" npm run test:e2e
