name: CI

# PR 上跑权威门：node:test 单测（纯逻辑，jsdom）+ xvfb 真 Electron e2e。
# 给 PR 一个真·绿勾，watch CI 时能看到真 check。
#
# ⚠ 只改 ui-demo/（独立前端原型，不属于 Electron 主程序）的 PR 不需要跑 Electron 真门，
# 但 test/e2e 是 main 的 required status check —— 如果用 `paths-ignore: ui-demo/**` 让整个
# workflow 不触发，这俩必需检查就永远不报告，ui-demo-only 的 PR 会被永久 BLOCKED。
# 所以这里改成：workflow 总是触发，先用 `changes` job 探测「有没有非 ui-demo 改动」，
# test/e2e `needs: changes` 且仅在有非 ui-demo 改动时跑；纯 ui-demo 改动时它俩被 skip。
# GitHub 把 **skipped 的 required check 算作通过**，于是 ui-demo-only PR 能正常合，
# 而真改动仍被 e2e 卡住 —— 门不削弱。
on:
  pull_request:
  push:
    branches: [main]

# 同一 PR 连推多次 → 取消上一轮还在跑的 CI，不并行白烧 Actions 分钟。
# group 取 PR 号（pull_request 事件）/ commit SHA（push 到 main）：
#   · PR 内连续 push 共享同一 group → 旧跑被取消、只留最新一轮；
#   · push 到 main 时没有 PR 号 → 落到唯一的 SHA → 每个 main commit 各自一组，
#     cancel-in-progress 永不取消 main 的验证跑（main 每次提交都要被真门验证）。
concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # 探测「本次有没有改到 ui-demo/ 以外的文件」。保守：算不出 diff 就默认要跑真门。
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.f.outputs.app }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: f
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi
          # 默认 app=true（保守：跑真门）；只有「能算出 diff、有改动、且全部在 ui-demo/ 下」才跳。
          app=true
          if files=$(git diff --name-only "$base" "$head" 2>/dev/null); then
            if [ -n "$files" ] && ! printf '%s\n' "$files" | grep -qvE '^ui-demo/'; then
              app=false
            fi
          fi
          echo "changed (non-empty=$( [ -n "${files:-}" ] && echo y || echo n )), run-app-gate=$app"
          echo "app=$app" >> "$GITHUB_OUTPUT"

  test:
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' }}
    runs-on: ubuntu-latest
    env:
      # 单测是 node:test + jsdom 的纯逻辑，不需要 Electron 二进制 → 跳下载省时间。
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test

  # e2e 真门：在 ubuntu runner 上用 xvfb 真启动 Electron 跑 Playwright，
  # 抓「单测全绿但 app 其实打不开」这类渲染层/集成 bug。含两组：
  #   ① app.spec.js：编辑器全功能（打开/编辑保存/保真/工具栏/斜杠/拖块/锁定块/历史/关窗拦截）
  #   ② fidelity.spec.js：文档自带样式真渲染 + 收紧 CSP 无违规 + 文档脚本/onerror 不执行
  # 要让红 e2e 真挡住 merge，需在 GitHub 把本 job 设为 main 的 required status check。
  # 独立 job，绝不继承上面 test job 的 ELECTRON_SKIP_BINARY_DOWNLOAD=1
  # ——e2e 要真 Electron 二进制；CI runner 无防火墙能正常下载。
  e2e:
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' }}
    # pin 22.04（jammy）：ubuntu-latest 已指向 24.04（noble），其包名漂移
    # （libasound2→libasound2t64 等）会让 playwright install-deps 补不全 Electron
    # 的 Chromium 系统库、正常 app 也启动失败 → 门误红。22.04 上这套组合成熟稳定。
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: sudo apt-get update && sudo apt-get install -y xvfb
      - run: npx playwright install-deps chromium
      - run: xvfb-run -a --server-args="-screen 0 1280x720x24" npm run test:e2e
