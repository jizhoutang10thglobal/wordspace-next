name: CI

# PR 上跑权威门：node:test 单测（纯逻辑，jsdom）+ xvfb 真 Electron e2e。
# 给 PR 一个真·绿勾，watch CI 时能看到真 check。
#
# ⚠ 只改 ui-demo/（独立前端原型，不属于 Electron 主程序）的 PR 不需要跑 Electron 真门，
# 但 test/e2e 是 main 的 required status check —— 如果用 `paths-ignore: ui-demo/**` 让整个
# workflow 不触发，这俩必需检查就永远不报告，ui-demo-only 的 PR 会被永久 BLOCKED。
# 所以这里改成：workflow 总是触发，先用 `changes` job 探测「有没有非 ui-demo 改动」，
# test/e2e `needs: changes` 且仅在有非 ui-demo 改动时跑；纯 ui-demo 改动时它俩被 skip。
# GitHub 把 **skipped 的 required check 算作通过**，于是 ui-demo-only PR 能正常合，
# 而真改动仍被 e2e 卡住 —— 门不削弱。
on:
  pull_request:
  push:
    branches: [main]

# 同一 PR 连推多次 → 取消上一轮还在跑的 CI，不并行白烧 Actions 分钟。
# group 取 PR 号（pull_request 事件）/ commit SHA（push 到 main）：
#   · PR 内连续 push 共享同一 group → 旧跑被取消、只留最新一轮；
#   · push 到 main 时没有 PR 号 → 落到唯一的 SHA → 每个 main commit 各自一组，
#     cancel-in-progress 永不取消 main 的验证跑（main 每次提交都要被真门验证）。
concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # 探测「本次有没有改到 ui-demo/ 以外的文件」。保守：算不出 diff 就默认要跑真门。
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.f.outputs.app }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: f
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi
          # 默认 app=true（保守：跑真门）；只有「能算出 diff、有改动、且全部在 ui-demo/ 下」才跳。
          app=true
          if files=$(git diff --name-only "$base" "$head" 2>/dev/null); then
            if [ -n "$files" ] && ! printf '%s\n' "$files" | grep -qvE '^ui-demo/'; then
              app=false
            fi
          fi
          echo "changed (non-empty=$( [ -n "${files:-}" ] && echo y || echo n )), run-app-gate=$app"
          echo "app=$app" >> "$GITHUB_OUTPUT"

  test:
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' }}
    runs-on: ubuntu-latest
    env:
      # 单测是 node:test + jsdom 的纯逻辑，不需要 Electron 二进制 → 跳下载省时间。
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      # i18n 防漂移门(scan 硬编码中文 / parity zh-en 对齐 / usage 调用点 key 存在)。真 app 侧的门放 CI 有牙
      # ——ui-demo 侧的同款门只在本地跑是盲区,这里不复刻那个盲区。
      - run: npm run i18n:scan
      - run: npm test

  # e2e 真门：在 ubuntu runner 上用 xvfb 真启动 Electron 跑 Playwright，
  # 抓「单测全绿但 app 其实打不开」这类渲染层/集成 bug。含两组：
  #   ① app.spec.js：编辑器全功能（打开/编辑保存/保真/工具栏/斜杠/拖块/锁定块/历史/关窗拦截）
  #   ② fidelity.spec.js：文档自带样式真渲染 + 收紧 CSP 无违规 + 文档脚本/onerror 不执行
  # 要让红 e2e 真挡住 merge，需在 GitHub 把本 job 设为 main 的 required status check。
  # 独立 job，绝不继承上面 test job 的 ELECTRON_SKIP_BINARY_DOWNLOAD=1
  # ——e2e 要真 Electron 二进制；CI runner 无防火墙能正常下载。
  # 分片并行（2026-07-20，e2e 策略 plan U2）：把串行全量 e2e（~416 条 ~11 分）切成 4 个矩阵分片并跑，
  # 墙上时间到绿 ~13→~5 分。每片仍 workers:1（跨 runner 分片天然隔离，规避多 Electron 单机抢端口/单实例锁：
  # browser/web-downloads 起本地 http server，单机并发会撞端口）。fail-fast:false=一片红不取消别片，才看得全。
  # ⚠ required status check 从 `e2e` 迁到下面的 `e2e-all` 聚合门——分片后 `e2e` 这个名不再存在。
  e2e:
    needs: changes
    if: ${{ needs.changes.outputs.app == 'true' }}
    # pin 22.04（jammy）：ubuntu-latest 已指向 24.04（noble），其包名漂移
    # （libasound2→libasound2t64 等）会让 playwright install-deps 补不全 Electron
    # 的 Chromium 系统库、正常 app 也启动失败 → 门误红。22.04 上这套组合成熟稳定。
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: sudo apt-get update && sudo apt-get install -y xvfb
      - run: npx playwright install-deps chromium
      # --shard=i/4：Playwright 把测试列表按 test 数/顺序切给这一片；--reporter=blob 产可合并的中间报告。
      - run: xvfb-run -a --server-args="-screen 0 1280x720x24" npx playwright test --shard=${{ matrix.shard }}/4 --reporter=blob
      # 上传本片 blob，给 e2e-all 合并数「无漏测」。!cancelled() 保证红片也传（合并要看全）。
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 3

  # 聚合门（fail-closed，e2e 策略 plan U2/KD4）：分片后 required status check 迁到这个稳定名 `e2e-all`。
  # 迁移序（Colin 手动，一次性）：① 先把 e2e-all 加进 branch protection required（保留 e2e）+ 开 admin-merge；
  # ② admin-merge 携带本改动的 PR（它的 e2e 这个 check 不再上报，预期）；③ e2e-all 在 main 出现后再删 e2e。
  # ⚠ fail-closed：只有「changes 真成功 且 判定纯 ui-demo」才放行；changes 自己挂掉/output 空/app==true 一律
  # 要求 e2e 真绿——否则「探测 job 挂了→分片被 skip→门却绿」就是 S1-S4 的假绿，绝不允许（KD6）。
  e2e-all:
    needs: [changes, e2e]
    if: ${{ always() }}
    runs-on: ubuntu-22.04
    steps:
      - name: Gate（fail-closed）
        run: |
          cr="${{ needs.changes.result }}"; app="${{ needs.changes.outputs.app }}"; er="${{ needs.e2e.result }}"
          echo "changes.result=$cr  app=$app  e2e.result=$er"
          if [ "$cr" = "success" ] && [ "$app" = "false" ]; then
            echo "docs-only（纯 ui-demo，e2e 合规 skip）→ 放行"; exit 0
          fi
          if [ "$er" != "success" ]; then
            echo "::error::e2e 未全绿（result=$er）或 changes 异常 → 门红（fail-closed）"; exit 1
          fi
          echo "e2e 全绿 → 继续做无漏测检查"
      # 无漏测强制（KD6，adversarial）：合并 blob 数 spec 数，低于地板 = 疑似 test.only/skip/spec 改名/空分片 → 红。
      - uses: actions/checkout@v4
        if: ${{ needs.changes.outputs.app == 'true' && needs.e2e.result == 'success' }}
      - uses: actions/setup-node@v4
        if: ${{ needs.changes.outputs.app == 'true' && needs.e2e.result == 'success' }}
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
        if: ${{ needs.changes.outputs.app == 'true' && needs.e2e.result == 'success' }}
      - uses: actions/download-artifact@v4
        if: ${{ needs.changes.outputs.app == 'true' && needs.e2e.result == 'success' }}
        with:
          pattern: blob-report-*
          path: all-blobs
          merge-multiple: true
      - name: 无漏测（收集 spec 数 ≥ 地板）
        if: ${{ needs.changes.outputs.app == 'true' && needs.e2e.result == 'success' }}
        run: |
          npx playwright merge-reports --reporter=json all-blobs > merged.json
          count=$(node -e "const r=require('./merged.json');let n=0;const w=s=>{n+=(s.specs||[]).length;(s.suites||[]).forEach(w)};(r.suites||[]).forEach(w);console.log(n)")
          floor=400
          echo "collected e2e specs = $count (floor=$floor, 当前实测 416)"
          if [ "$count" -lt "$floor" ]; then
            echo "::error::收集到的 e2e 用例数 $count < 地板 $floor → 疑似漏测（test.only/describe.skip/spec 改名/空分片）→ 门红"; exit 1
          fi
          echo "无漏测检查通过"
