# Skill 发布镜像：main 上 skills/** 有变更 → 自动推到公开分发仓 wordspace-ai/skills。
# 用户安装命令 = `npx skills add wordspace-ai/skills`（skills 生态标准，70+ agent 通用）。
# 主仓 skills/ 是开发真相源（防漂移测试锁着 docs/ 正本 ↔ skill 拷贝逐字节一致）；
# org 仓只是发布端、永远被本 workflow 整体覆盖，别在那边手改。
#
# 认证 = wordspace-ai/skills 仓上的可写 Deploy Key（2026-07-03 已配好：公钥在该仓
# Settings→Deploy keys，私钥在本仓 secret `SKILLS_MIRROR_SSH_KEY`）。选 deploy key 不选 PAT：
# 权限最小（只此一仓）、不挂个人账号；org 曾默认禁 deploy key，已 PATCH /orgs 打开
# （deploy_keys_enabled_for_repositories=true）。secret 没配时本 workflow 静默跳过（不红）。
name: Skills Mirror

on:
  push:
    branches: [main]
    paths: ['skills/**']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Check mirror key
        id: gate
        env:
          KEY: ${{ secrets.SKILLS_MIRROR_SSH_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "SKILLS_MIRROR_SSH_KEY 未配置——跳过镜像"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Mirror skills/ to wordspace-ai/skills
        if: steps.gate.outputs.enabled == 'true'
        env:
          KEY: ${{ secrets.SKILLS_MIRROR_SSH_KEY }}
        run: |
          set -euo pipefail
          keyfile=$(mktemp)
          printf '%s\n' "$KEY" > "$keyfile"
          chmod 600 "$keyfile"
          export GIT_SSH_COMMAND="ssh -i $keyfile -o StrictHostKeyChecking=accept-new"
          SRC_SHA=$(git rev-parse --short HEAD)
          workdir=$(mktemp -d)
          git clone --depth 1 "git@github.com:wordspace-ai/skills.git" "$workdir"
          # 整体覆盖：删掉旧内容（保留 .git），拷入主仓 skills/ 的全部 skill 目录 + 说明
          find "$workdir" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R skills/. "$workdir/"
          {
            echo "# Wordspace Skills"
            echo
            echo "让你的 AI（Claude Code / Cursor / 70+ agent）会写、会改 Wordspace 文档。"
            echo
            echo '```'
            echo "npx skills add wordspace-ai/skills"
            echo '```'
            echo
            echo "本仓由 wordspace-next 主仓自动镜像（源 commit ${SRC_SHA}），请勿在此仓直接修改。"
          } > "$workdir/README.md"
          cd "$workdir"
          git config user.name "wordspace demo bot"
          git config user.email "demo-bot@wordspace.local"
          git add -A
          if git diff --cached --quiet; then
            echo "无变化，跳过 push"
          else
            git commit -m "sync from wordspace-next@${SRC_SHA}"
            git push origin HEAD
          fi
