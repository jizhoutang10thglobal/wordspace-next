name: Release

# 把 lfg 的右边缘从「合 PR」推到「签名+公证的 macOS app 发上本仓 Releases + 自动更新」。
#   gate (ubuntu)   → vitest 快门 + xvfb 真 Electron e2e（防「vitest 绿但 app 坏」，S3/S4）
#   release (macos) → 从 tag 算版本 → 签名+公证打包 → **只有打包成功后** 才建带 tag 的已发布 Release
# Developer ID 直分发 + electron-updater（决策 A）；发本仓自己 Releases，public、无镜像（决策 B）。
#
# 关键设计（适配 main 的分支保护：required PR + enforce_admins）：
#   main 受保护，**任何直推 main 都会被拒**（含 github-actions[bot]，enforce_admins=true 连 bot 都不放行）。
#   所以本流水线**完全不写 main**：版本号不再 commit 回 package.json，而是从 git tag 推算（tag 不受分支保护）。
#   成功后只由 softprops 建一个带 vX.Y.Z tag 的 Release（它在当前 SHA 上创建 tag ref）。版本号的唯一真源 = tag。
#   失败安全：build/公证失败 → 后面建 Release 的步骤不执行 → 无 tag、无 Release、main 纹丝不动。
#
# 需要 5 个 repo secrets（见 docs/macos-shipping-pipeline-brief.md §6）：
#   CSC_LINK / CSC_KEY_PASSWORD / APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID
#
# 注：gate 的 vitest+e2e 手抄 ci.yml 形状（发签名版本风险高于合 PR，门只强不弱）；未 dedup，演示期可接受。

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'specs/**'
      - '.github/**'   # 改流水线自身（如本文件）不自触发发版；真功能改动（src/**）仍自动发版
      - 'website/**'   # wordspace.ai 官网（独立 Next.js / Vercel 部署）；改官网不触发 editor 签名发版
  workflow_dispatch:
    inputs:
      version:
        description: '手动指定版本号（如 0.1.0）；留空则取 max(最高 tag patch+1, package.json.version)'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ── Job 0: 权威门 = vitest + 真 Electron e2e（xvfb）。发版前必过，绝不只靠 vitest（S3/S4 红线）。 ──
  gate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm test
      - run: sudo apt-get update && sudo apt-get install -y xvfb
      - run: npx playwright install-deps chromium
      - run: xvfb-run -a --server-args="-screen 0 1280x720x24" npm run test:e2e

  # ── Job 1: 打包+签名+公证；成功后建带 tag 的 Release。全程不写 main。 ──
  release:
    needs: gate
    runs-on: macos-latest
    # version 输出给下面的 build-win：两平台用同一个版本号 / 同一个 tag，产物进同一个 Release。
    outputs:
      version: ${{ steps.version.outputs.version }}
    # 公证正常 2–15min，但 Apple 队列偶发拥堵可超 30min（实测撞过）。60min 封顶：给 Apple 队列余量，
    # 又不至于卡死时白占 6h 默认上限。配合下面 build 步的 DEBUG=electron-notarize* 区分「Apple 队列慢」
    # vs「notarytool 卡死」——前者日志会打 submission id + 轮询，后者签名后就闷死。
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0   # 取全历史 + tags，下面要按已有 tag 推算下一个版本号
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      # 绝不设 ELECTRON_SKIP_BINARY_DOWNLOAD —— 打包要真 electron 二进制（同 ci.yml e2e job，CLAUDE.md S3）
      - run: npm ci

      # 版本号 = 手动指定（dispatch input）> max(最高 tag patch+1, package.json.version)。
      # package.json.version 平时是基线（如 0.1.0），让 minor 跃迁能由 commit 控制：
      #   patch+1=0.0.5 vs pkg=0.1.0 → 取 0.1.0；下次 patch+1=0.1.1 > pkg → 取 0.1.1，自然单调递增。
      # 算出来写进本地 package.json 供 electron-builder 烤进产物，但**不 commit**（main 受保护）。
      - name: Compute release version
        id: version
        run: |
          set -euo pipefail
          git fetch --tags --force
          INPUT_VER="${{ github.event.inputs.version }}"
          # 严格只认 vMAJOR.MINOR.PATCH（三段纯数字）
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sed 's/^v//' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)
          if [ -z "$LATEST" ]; then
            TAGBUMP="0.0.1"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
            case "$PATCH" in ''|*[!0-9]*) echo "non-numeric patch in tag: $PATCH" >&2; exit 1;; esac
            TAGBUMP="$MAJOR.$MINOR.$((PATCH + 1))"
          fi
          PKGVER=$(node -e "process.stdout.write(require('./package.json').version)")
          if [ -n "$INPUT_VER" ]; then
            NEW="$INPUT_VER"
          else
            NEW=$(printf '%s\n%s\n' "$TAGBUMP" "$PKGVER" | sort -V | tail -1)
          fi
          case "$NEW" in [0-9]*.[0-9]*.[0-9]*) ;; *) echo "bad version: $NEW" >&2; exit 1;; esac
          if git rev-parse "v$NEW" >/dev/null 2>&1; then echo "tag v$NEW already exists" >&2; exit 1; fi
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='$NEW';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "input=${INPUT_VER:-<none>} tagbump=$TAGBUMP pkg=$PKGVER → releasing v$NEW"

      # 签名+公证打包。缺 secrets / 公证失败 → 此步失败 → 后面建 Release 的步骤被跳过，main 与 tag 都不动。
      - name: Build, sign & notarize macOS app
        run: npx electron-builder --mac --publish never
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # 让公证过程可见：@electron/notarize 会打印「已提交 Apple，submission id=xxx，轮询中」。
          # 看到 submission id 还超时 = Apple 队列慢（值得重跑）；连 id 都没有 = notarytool 卡死（换路排查）。
          DEBUG: electron-notarize*

      # staple（scripts/notarize-dmg.js 的 afterAllArtifactBuild 钩子）会改 dmg 文件，而
      # electron-builder 写 latest-mac.yml 用的是构建时的内存校验和（在钩子之后落盘）——
      # v0.0.3 实测 yml 里 dmg 的 sha512/size 是 staple 前旧值（zip 不受影响、自动更新没事，
      # 但元数据不能撒谎）。钩子内的同名修正只在 yml 先落盘的顺序下生效，这里上传前兜底重算。
      # 逻辑与 scripts/notarize-dmg.js 的 patchUpdateInfo 同源；不放 scripts/ 是因为 scripts/**
      # 不在本 workflow 的 paths-ignore 里、动它会自触发发版。
      - name: Fix latest-mac.yml dmg checksum after staple
        run: |
          node -e '
            const crypto = require("crypto"), fs = require("fs"), path = require("path");
            const dir = "release";
            const yml = path.join(dir, "latest-mac.yml");
            if (!fs.existsSync(yml)) { console.log("no latest-mac.yml"); process.exit(0); }
            const dmg = fs.readdirSync(dir).find((f) => f.endsWith(".dmg"));
            if (!dmg) { console.log("no dmg"); process.exit(0); }
            const file = path.join(dir, dmg);
            const sha512 = crypto.createHash("sha512").update(fs.readFileSync(file)).digest("base64");
            const size = fs.statSync(file).size;
            const lines = fs.readFileSync(yml, "utf8").split("\n");
            const i0 = lines.findIndex((l) => l.includes("url: " + dmg));
            if (i0 === -1) { console.log("dmg not in yml"); process.exit(0); }
            for (let i = i0 + 1; i < lines.length && !lines[i].includes("- url:"); i++) {
              if (/^\s+sha512:/.test(lines[i])) lines[i] = lines[i].replace(/sha512:.*/, "sha512: " + sha512);
              if (/^\s+size:/.test(lines[i])) lines[i] = lines[i].replace(/size:.*/, "size: " + size);
            }
            fs.writeFileSync(yml, lines.join("\n"));
            console.log("latest-mac.yml dmg entry fixed:", dmg, "size", size);
          '

      # ↓↓↓ 只在打包成功后执行（步骤失败即停） ↓↓↓
      # softprops 在当前 SHA 上创建 tag_name=vX.Y.Z（tag ref 不受 main 分支保护管）并建已发布 Release。
      # 不走 draft、不推 main：tag 就是版本真源；dmg 给下载，zip + latest-mac.yml 给 electron-updater。
      - name: Create published Release with signed artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
          fail_on_unmatched_files: true

  # ── Job 2: Windows 打包（nsis，不签名 = 接受 SmartScreen 警告，同老 wordspace 决策十四）。 ──
  # 对 mac 零风险：mac 的 release job 一字不改；本 job needs: release，等 mac 先建好 tag/Release，
  # 再把 .exe + latest.yml upsert（softprops 同 tag 追加）到同一个 Release——mac/win 两套自动更新
  # 清单（latest-mac.yml / latest.yml）+ 两平台安装包共存于同一「latest」Release。
  # continue-on-error: Windows 构建挂了也只是 win 没出，mac 已发、整个 workflow 不红（决策十三双写哲学）。
  # ⚠ 未在真 Windows 上验证过功能（无 Windows 机器）——路径已修为跨平台（src/lib/path-url.js），
  #   但开/编辑/存/自动更新由用户实测反馈。详见交付说明。
  build-win:
    needs: release
    runs-on: windows-latest
    continue-on-error: true
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      # 绝不设 ELECTRON_SKIP_BINARY_DOWNLOAD —— 打包要真 electron windows 二进制
      - run: npm ci
      # 把 mac 算出的同一版本号烤进本地 package.json（windows runner 用 bash 跑同款写入；不 commit）
      - name: Stamp release version into package.json
        shell: bash
        run: |
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='${{ needs.release.outputs.version }}';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
      # nsis 安装包（未签名）。electron-builder 生成 .exe + .exe.blockmap + latest.yml（win 自动更新清单）。
      - name: Build Windows installer (nsis, unsigned)
        run: npx electron-builder --win --publish never
      # upsert：同 tag 第二次调 softprops → 把 win 产物追加到 mac 已建的同一个 Release。
      - name: Upload Windows artifacts to the same Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.release.outputs.version }}
          # blockmap 一并传：latest.yml 里有 blockMapSize 引用它，不传会让 win 更新先 404 再退回全量。
          # nsis 必产 <exe>.blockmap（app-builder-lib），故 glob 必命中。
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          fail_on_unmatched_files: true
