name: Release

# 把 lfg 的右边缘从「合 PR」推到「签名+公证的 macOS app 发上本仓 Releases + 自动更新」。
#   gate (ubuntu)   → vitest 快门 + xvfb 真 Electron e2e（防「vitest 绿但 app 坏」，S3/S4）
#   release (macos) → 从 tag 算版本 → 签名+公证打包 → **只有打包成功后** 才建带 tag 的已发布 Release
# Developer ID 直分发 + electron-updater（决策 A）；发本仓自己 Releases，public、无镜像（决策 B）。
#
# 关键设计（适配 main 的分支保护：required PR + enforce_admins）：
#   main 受保护，**任何直推 main 都会被拒**（含 github-actions[bot]，enforce_admins=true 连 bot 都不放行）。
#   所以本流水线**完全不写 main**：版本号不再 commit 回 package.json，而是从 git tag 推算（tag 不受分支保护）。
#   成功后只由 softprops 建一个带 vX.Y.Z tag 的 Release（它在当前 SHA 上创建 tag ref）。版本号的唯一真源 = tag。
#   失败安全：build/公证失败 → 后面建 Release 的步骤不执行 → 无 tag、无 Release、main 纹丝不动。
#
# 需要 5 个 repo secrets（见 docs/macos-shipping-pipeline-brief.md §6）：
#   CSC_LINK / CSC_KEY_PASSWORD / APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID
#
# 注：gate 的 vitest+e2e 手抄 ci.yml 形状（发签名版本风险高于合 PR，门只强不弱）；未 dedup，演示期可接受。

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'specs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ── Job 0: 权威门 = vitest + 真 Electron e2e（xvfb）。发版前必过，绝不只靠 vitest（S3/S4 红线）。 ──
  gate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm test
      - run: sudo apt-get update && sudo apt-get install -y xvfb
      - run: npx playwright install-deps chromium
      - run: xvfb-run -a --server-args="-screen 0 1280x720x24" npm run test:e2e

  # ── Job 1: 打包+签名+公证；成功后建带 tag 的 Release。全程不写 main。 ──
  release:
    needs: gate
    runs-on: macos-latest
    # 公证正常 2–15min，但 Apple 队列偶发拥堵可超 30min（实测撞过）。60min 封顶：给 Apple 队列余量，
    # 又不至于卡死时白占 6h 默认上限。配合下面 build 步的 DEBUG=electron-notarize* 区分「Apple 队列慢」
    # vs「notarytool 卡死」——前者日志会打 submission id + 轮询，后者签名后就闷死。
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0   # 取全历史 + tags，下面要按已有 tag 推算下一个版本号
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      # 绝不设 ELECTRON_SKIP_BINARY_DOWNLOAD —— 打包要真 electron 二进制（同 ci.yml e2e job，CLAUDE.md S3）
      - run: npm ci

      # 版本号唯一真源 = git tag（不读也不写 package.json 的 version）。取最高的 vX.Y.Z tag、patch +1；
      # 无 tag（首发）则 v0.0.1。算出来写进本地 package.json 供 electron-builder 烤进产物，但**不 commit**。
      - name: Compute next version from latest tag
        id: version
        run: |
          git fetch --tags --force
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sed 's/^v//' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            NEW="0.0.1"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
            NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          fi
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='$NEW';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Latest tag: ${LATEST:-<none>} → releasing v$NEW"

      # 签名+公证打包。缺 secrets / 公证失败 → 此步失败 → 后面建 Release 的步骤被跳过，main 与 tag 都不动。
      - name: Build, sign & notarize macOS app
        run: npx electron-builder --mac --publish never
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # 让公证过程可见：@electron/notarize 会打印「已提交 Apple，submission id=xxx，轮询中」。
          # 看到 submission id 还超时 = Apple 队列慢（值得重跑）；连 id 都没有 = notarytool 卡死（换路排查）。
          DEBUG: electron-notarize*

      # ↓↓↓ 只在打包成功后执行（步骤失败即停） ↓↓↓
      # softprops 在当前 SHA 上创建 tag_name=vX.Y.Z（tag ref 不受 main 分支保护管）并建已发布 Release。
      # 不走 draft、不推 main：tag 就是版本真源；dmg 给下载，zip + latest-mac.yml 给 electron-updater。
      - name: Create published Release with signed artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
          fail_on_unmatched_files: true
