<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' file:; frame-src file:; img-src 'self' file: data:; style-src 'self' file:; script-src 'self' file:">
<title>Wordspace Next</title>
<link rel="stylesheet" href="shell.css">
</head>
<body>
<header id="topbar">
  <span id="brand">Wordspace Next</span>
  <span class="topbar-sep"></span>
  <button id="open-btn">打开</button>
  <span id="doc-name"></span>
  <span id="dirty-dot" hidden>●</span>
  <span class="spacer"></span>
  <button id="mode-btn" disabled>预览</button>
  <button id="history-btn" disabled>历史版本</button>
  <button id="save-btn" disabled>保存</button>
</header>
<div id="toolbar" hidden></div>
<main id="home">
  <h1>Wordspace Next</h1>
  <p class="hint">打开一个 HTML 文档开始编辑</p>
  <ul id="recent-list"></ul>
</main>
<iframe id="doc-frame" sandbox="allow-same-origin" hidden></iframe>
<div id="history-modal" hidden>
  <div class="modal-box">
    <h2>历史版本</h2>
    <ul id="history-list"></ul>
    <button id="history-close">关闭</button>
  </div>
</div>
<script src="../editor/blocks.js"></script>
<script src="../editor/serialize.js"></script>
<script src="../editor/undo.js"></script>
<script src="../editor/format.js"></script>
<script src="../editor/canvas.js"></script>
<script src="../editor/toolbar.js"></script>
<script src="../editor/slashmenu.js"></script>
<script src="../editor/draghandle.js"></script>
<script src="shell.js"></script>
</body>
</html>
