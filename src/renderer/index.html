<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">
  <title>Wordspace</title>
  <style>
    :root {
      --shell-bg: #f0f0f0;
      --shell-text: #333333;
      --statusbar-bg: #e0e0e0;
      --statusbar-border: #cccccc;
    }

    html.theme-dark {
      --shell-bg: #1e1e1e;
      --shell-text: #d4d4d4;
      --statusbar-bg: #2d2d2d;
      --statusbar-border: #404040;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background: var(--shell-bg);
      color: var(--shell-text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #doc-container {
      flex: 1;
      overflow: auto;
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
      /* Fixed paper colors — not derived from CSS variables.
         Breaks the cascade at the container boundary. */
      background: #ffffff;
      color: #000000;
    }

    #status-bar {
      flex-shrink: 0;
      height: 32px;
      background: var(--statusbar-bg);
      border-top: 1px solid var(--statusbar-border);
      display: flex;
      align-items: center;
      padding: 0 1rem;
    }

    #theme-toggle {
      font-size: 12px;
      padding: 2px 8px;
      cursor: pointer;
      border: 1px solid var(--statusbar-border);
      background: transparent;
      color: var(--shell-text);
      border-radius: 3px;
    }

    #theme-toggle:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div id="doc-container"></div>
  <div id="status-bar">
    <button id="theme-toggle">&#9728; Light</button>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
