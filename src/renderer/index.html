<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' file:; frame-src file:; img-src 'self' file: data:; style-src 'self' file:; script-src 'self' file:">
<title>Wordspace Next</title>
<link rel="stylesheet" href="shell.css">
<link rel="stylesheet" href="basic-edit.css">
</head>
<body>

<!-- 左侧本地文件栏（F06，对齐 ui-demo ArcSidebar 的「连接文件夹」一支）。body 是 flex 行：侧栏定宽，#main flex:1。 -->
<aside id="sidebar" class="sb">
  <div class="sb-resize" id="sb-resize" title="拖拽调整侧栏宽度"></div>
  <div class="sb-head">
    <button id="sb-toggle" class="sb-icobtn" title="收起/展开侧栏 (Cmd+\)">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M9 4v16"/></svg>
    </button>
    <span class="sb-title ws-truncate" id="sb-root-name">本地文件</span>
    <!-- 查找文件的可见入口（T7，Colin 拍板）：调 Cmd+P 命令面板，此前只有快捷键、界面无入口 -->
    <button id="sb-find" class="sb-icobtn" title="查找文件 (Cmd+P)">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
    </button>
    <button id="sb-open-folder" class="sb-icobtn" title="打开文件夹">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h5l2 2h9a1 1 0 0 1 1 1v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a1 1 0 0 1 1-1z"/></svg>
    </button>
  </div>
  <div class="sb-body" id="sb-body">
    <div class="sb-empty" id="sb-empty">
      <div class="sb-empty-note">打开一个本地文件夹，把这里当工作区</div>
      <button id="sb-empty-open" class="sb-empty-btn">打开文件夹</button>
    </div>
    <!-- 置顶区（钉住的文件）：有置顶才显示。sidebar.js 填充。 -->
    <div class="sb-zone" id="sb-pinned" hidden></div>
    <!-- 标签页区（打开记录，浏览器式 tab）：有打开的才显示，头部带 + 新建。sidebar.js 填充。 -->
    <div class="sb-zone" id="sb-tabs" hidden></div>
    <!-- 文档区：「文件」段标 + 筛选 + 文件树（对齐 ui-demo 的 置顶/标签页/文件 三段节奏） -->
    <div class="sb-sec-label sb-files-label" id="sb-files-label" hidden>文件</div>
    <div class="sb-filter" id="sb-filter" hidden>
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="sb-filter-input" type="text" placeholder="筛选文件" spellcheck="false">
      <!-- 清除钮（T8 对齐 ui-demo arc-filter-clear）：输入非空时显示 -->
      <button id="sb-filter-clear" class="sb-filter-clear" title="清除" hidden>
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="sb-tree" id="sb-tree" hidden></div>
  </div>
  <!-- 品牌页脚：wordspace.ai logo + 版本号（左侧栏底部，增强 branding）。 -->
  <div class="sb-foot">
    <img class="sb-foot-logo" src="wordspace-wordmark.png" alt="wordspace.ai">
    <span class="sb-foot-ver" id="ws-ver"></span>
  </div>
</aside>

<!-- 编辑区（照搬 ui-demo Canvas chrome）。 -->
<section id="main" class="ws-main-doc">
  <!-- 侧栏「真收起」（全隐藏）后的悬浮展开入口：钉在编辑区左上角空档（顶栏左内边距 56px 给它留位），
       仅 body.is-sb-collapsed 时显示。侧栏全隐后 sb-toggle 也没了，靠它 / Cmd+\ 重开。 -->
  <button id="sb-reopen" class="sb-reopen" title="展开侧栏 (Cmd+\)">
    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M9 4v16"/></svg>
  </button>
  <!-- 右上角 ⋯ 菜单（Colin 2026-07-02：三颗外露按钮收进一个三点菜单，像 ui-demo 文档头的 … ）。
       原按钮变菜单项、ID 不变（shell.js 的 disabled 接线与 e2e 选择器沿用）。
       「保存」→「另存为…」（自动保存后保存钮失义；另存为=把当前文档复制存到任意位置）；「导出」→「导出 PDF」。 -->
  <div class="top-actions">
    <button id="doc-menu-btn" class="ta-more" title="更多操作">
      <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="5" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg>
    </button>
    <div id="doc-menu" class="ws-docmenu" hidden>
      <button id="open-btn" class="ws-docmenu-item">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h5l2 2h9a1 1 0 0 1 1 1v9a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a1 1 0 0 1 1-1z"/></svg>
        <span>打开…</span>
      </button>
      <button id="save-btn" class="ws-docmenu-item" disabled>
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M17 21v-7H7v7"/><path d="M7 3v4h8"/></svg>
        <span>另存为…</span>
      </button>
      <div class="ws-docmenu-sep"></div>
      <!-- 导出 PDF：直接走 Wordspace 样式（所见即所得）。raw 代码路径仍保留、未接 UI，见 shell.js。 -->
      <button id="export-btn" class="ws-docmenu-item" disabled title="导出 PDF（所见即所得）">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M5 21h14"/></svg>
        <span>导出 PDF</span>
      </button>
    </div>
  </div>

  <div class="ws-canvas">
    <!-- 文档头：面包屑 本地 / 文件名 + 元信息（仅开文档时显示）。定高实心条 + 底分隔线，把顶栏与编辑区隔开。 -->
    <div id="doc-header" class="ws-doc-header" hidden>
      <div class="ws-breadcrumb">
        <span>本地</span>
        <span class="ws-bc-sep">/</span>
        <span id="doc-name" class="ws-doc-crumb"></span>
        <span id="dirty-dot" class="ws-dirty" hidden>● 未保存</span>
        <!-- 当前文件状态标（本地未发布）。对齐 ui-demo omnibox 的「本地」tag，复用面包屑、不另起地址栏。 -->
        <span id="doc-status" class="ws-status-tag" hidden>本地</span>
      </div>
    </div>

    <!-- 空态（无文档时） -->
    <div id="home" class="ws-empty-wrap">
      <div class="ws-empty">
        <div class="ws-empty-title">Wordspace Next</div>
        <div class="ws-empty-note">打开一个 HTML / Markdown 文档，或把一个文件夹当工作区</div>
        <div class="ws-empty-actions">
          <button id="home-open" class="top-share">打开文档</button>
          <button id="home-open-folder" class="ta-ghost ws-empty-ghost">打开文件夹</button>
        </div>
        <ul id="recent-list"></ul>
      </div>
    </div>

    <!-- 非合规文件降级提示条（Feature 3）：仅非合规文档时显示，shell.js 切换 hidden。位于 doc-header 与 iframe 之间。 -->
    <div id="ws-degrade-notice" class="ws-degrade-notice" hidden>
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
      <span>此文件不符合 Wordspace Schema，仅支持<strong>基础编辑</strong>：点文字改字（选中出格式条：粗/斜/下/删 + 文字色/高亮/清除）· 悬停任意块右上角 <strong>🗑 删除</strong> · 按 <strong>Esc</strong> 后用方向键在块间移动、Delete 删除。</span>
    </div>

    <iframe id="doc-frame" sandbox="allow-same-origin" hidden></iframe>

    <!-- 非 HTML 文件的应用内查看器（图片/PDF 直接预览；Word/表格/其他 → 外部打开卡片）。shell.js 填充。 -->
    <div id="viewer" class="ws-viewer" hidden></div>
  </div>
</section>

<script src="../editor/serialize.js"></script>
<script src="../editor/undo.js"></script>
<script src="../editor/format.js"></script>
<script src="../lib/schema-model.js"></script>
<script src="../lib/schema-validate.js"></script>
<script src="../lib/schema-registry.js"></script>
<script src="../editor/blockedit.js"></script>
<script src="../editor/basic-edit.js"></script>
<script src="pdf-viewer.js"></script>
<script src="shell.js"></script>
<script src="../lib/tabs.js"></script>
<script src="sidebar.js"></script>
</body>
</html>
