<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">
  <title>Wordspace</title>
  <!-- 外置样式表：inline <style> 会被 CSP default-src 'self' 拦掉（spec2 假绿的根因）。
       同源外链受 default-src 'self' 放行，CSP 一字不用改。href 用相对路径（同 renderer.js 的写法）。 -->
  <link rel="stylesheet" href="theme.css">
</head>
<body class="light-theme">
  <div id="doc-container"></div>
  <div id="status-bar">
    <button id="theme-toggle">Dark / Light</button>
    <button id="view-toggle">Render / Source</button>
    <span id="release-badge">Shipped by the pipeline</span>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
